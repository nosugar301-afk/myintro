<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>자기소개하기</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    
    .icon-item {
      cursor: grab;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    
    .icon-item:active {
      cursor: grabbing;
      transform: scale(1.1);
    }
    
    .icon-item.dragging {
      opacity: 0.5;
      transform: scale(1.1);
    }
    
    .drop-zone {
      transition: all 0.3s ease;
      min-width: 100px;
      min-height: 80px;
    }
    
    .drop-zone.drag-over {
      background: #fef3c7 !important;
      border-color: #f59e0b !important;
      transform: scale(1.05);
    }
    
    .drop-zone.has-item {
      background: #ecfdf5 !important;
      border-color: #10b981 !important;
    }
    
    .recording {
      animation: pulse-record 1s ease-in-out infinite;
    }
    
    @keyframes pulse-record {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    }
    
    .icon-btn {
      position: relative;
    }
    
    .record-indicator {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: #10b981;
      border-radius: 50%;
      border: 2px solid white;
      display: none;
    }
    
    .has-recording .record-indicator {
      display: block;
    }
    
    .sentence-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }
  </style>
  <style>body { box-sizing: border-box; overscroll-behavior-y: none; }</style>
 </head>

   <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg hidden z-50">

  <script>
    // --- IndexedDB 데이터베이스 설정 (새로고침 시 유지용) ---
    const DB_NAME = "AudioRecordingsDB";
    const STORE_NAME = "audios";
    let db;

    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = (event) => reject("IndexedDB 권한 오류");
        request.onsuccess = (event) => {
          db = event.target.result;
          resolve(db);
        };
        request.onupgradeneeded = (event) => {
          db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
      });
    }

    function saveAudioToDB(id, blob) {
      if (!db) return;
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.put(blob, id);
    }

    function loadAudiosFromDB() {
      if (!db) return;
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      const requestKeys = store.getAllKeys();

      request.onsuccess = () => {
        requestKeys.onsuccess = () => {
          const keys = requestKeys.result;
          const values = request.result;
          
          keys.forEach((key, index) => {
            const blob = values[index];
            const url = URL.createObjectURL(blob);
            
            if (key === 'teacher_prefix') {
              teacherPrefixAudio = url;
              document.getElementById('prefix-status').textContent = '✅ 녹음 완료 (저장됨)';
              document.getElementById('play-prefix-btn').classList.remove('hidden');
            } else if (key === 'teacher_suffix') {
              teacherSuffixAudio = url;
              document.getElementById('suffix-status').textContent = '✅ 녹음 완료 (저장됨)';
              document.getElementById('play-suffix-btn').classList.remove('hidden');
            } else {
              recordedAudios[key] = url;
              const iconEl = document.querySelector(`[data-icon-id="${key}"]`);
              if (iconEl) iconEl.classList.add('has-recording');
            }
          });
        };
      };
    }

    function clearAllAudiosDB() {
      if (!confirm("저장된 교사 음성과 학생 녹음 데이터가 모두 삭제됩니다. 계속하시겠습니까?")) return;
      
      if (!db) return;
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.clear();
      
      tx.oncomplete = () => {
        // 메모리 초기화
        recordedAudios = {};
        teacherPrefixAudio = null;
        teacherSuffixAudio = null;
        
        // UI 초기화
        document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('has-recording'));
        document.getElementById('prefix-status').textContent = '녹음되지 않음';
        document.getElementById('play-prefix-btn').classList.add('hidden');
        document.getElementById('suffix-status').textContent = '녹음되지 않음';
        document.getElementById('play-suffix-btn').classList.add('hidden');
        
        showToast("모든 녹음 데이터가 완전히 초기화되었습니다! 🗑️");
      };
    }
    // ------------------------------------------------

    // 아이콘 데이터
    const iconData = [
      { id: 'pizza', emoji: '🍕', name: '피자' },
      { id: 'hamburger', emoji: '🍔', name: '햄버거' },
      { id: 'icecream', emoji: '🍦', name: '아이스크림' },
      { id: 'cake', emoji: '🎂', name: '케이크' },
      { id: 'apple', emoji: '🍎', name: '사과' },
      { id: 'banana', emoji: '🍌', name: '바나나' },
      { id: 'rice', emoji: '🍚', name: '밥' },
      { id: 'ramen', emoji: '🍜', name: '라면' },
      { id: 'dog', emoji: '🐶', name: '강아지' },
      { id: 'cat', emoji: '🐱', name: '고양이' },
      { id: 'rabbit', emoji: '🐰', name: '토끼' },
      { id: 'bear', emoji: '🐻', name: '곰' },
      { id: 'soccer', emoji: '⚽', name: '축구' },
      { id: 'basketball', emoji: '🏀', name: '농구' },
      { id: 'swimming', emoji: '🏊', name: '수영' },
      { id: 'bike', emoji: '🚴', name: '자전거' },
      { id: 'book', emoji: '📚', name: '책' },
      { id: 'game', emoji: '🎮', name: '게임' },
      { id: 'music', emoji: '🎵', name: '음악' },
      { id: 'painting', emoji: '🎨', name: '그림' },
      { id: 'movie', emoji: '🎬', name: '영화' },
      { id: 'travel', emoji: '✈️', name: '여행' },
      { id: 'flower', emoji: '🌸', name: '꽃' },
      { id: 'star', emoji: '⭐', name: '별' }
    ];

    let recordedAudios = {}; 
    let teacherPrefixAudio = null;
    let teacherSuffixAudio = null;
    let currentRecordingIconId = null;
    let currentTeacherRecordingPart = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let droppedIconId = null;

    const defaultConfig = {
      sentence_prefix: '나는',
      sentence_suffix: '를 좋아해요.'
    };

    function showToast(message, duration = 2500) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      toastMessage.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), duration);
    }

    function createIconsGrid() {
      const grid = document.getElementById('icons-grid');
      grid.innerHTML = '';

      iconData.forEach(icon => {
        const iconEl = document.createElement('div');
        iconEl.className = 'icon-item icon-btn flex flex-col items-center justify-center bg-gradient-to-br from-purple-100 to-pink-100 rounded-2xl p-3 md:p-4 shadow-md hover:shadow-lg';
        iconEl.setAttribute('data-icon-id', icon.id);
        iconEl.setAttribute('draggable', 'true');

        const recordIndicator = document.createElement('div');
        recordIndicator.className = 'record-indicator';

        iconEl.innerHTML = `
          <span class="text-3xl md:text-4xl">${icon.emoji}</span>
          <span class="text-xs md:text-sm font-medium text-gray-700 mt-1">${icon.name}</span>
        `;
        iconEl.appendChild(recordIndicator);

        let pressTimer = null;
        let isDragging = false;

        // 데스크톱 드래그 앤 드롭
        iconEl.addEventListener('dragstart', (e) => {
          isDragging = true;
          e.dataTransfer.setData('text/plain', icon.id);
          iconEl.classList.add('dragging');
        });
        iconEl.addEventListener('dragend', () => {
          isDragging = false;
          iconEl.classList.remove('dragging');
        });

        // 태블릿/모바일 터치 이벤트 (길게 누르기)
        iconEl.addEventListener('touchstart', (e) => {
          isDragging = false;
          pressTimer = setTimeout(() => {
            if (!isDragging) openRecordModal(icon);
          }, 600);
        }, { passive: true });

        iconEl.addEventListener('touchend', (e) => {
          if (pressTimer) {
            clearTimeout(pressTimer);
            if (!isDragging && e.cancelable === false) { 
              playIconAudio(icon);
            }
          }
        });

        iconEl.addEventListener('touchmove', () => {
          isDragging = true;
          if (pressTimer) clearTimeout(pressTimer);
        }, { passive: true });

        // 데스크톱 클릭 이벤트 (길게 누르기)
        iconEl.addEventListener('mousedown', () => {
          isDragging = false;
          pressTimer = setTimeout(() => {
            if (!isDragging) openRecordModal(icon);
          }, 600);
        });

        iconEl.addEventListener('mouseup', () => {
          if (pressTimer) clearTimeout(pressTimer);
        });

        iconEl.addEventListener('mouseleave', () => {
          isDragging = true;
          if (pressTimer) clearTimeout(pressTimer);
        });

        iconEl.addEventListener('click', (e) => {
          if (!isDragging) playIconAudio(icon);
        });

        grid.appendChild(iconEl);
      });
    }

    function playIconAudio(icon) {
      if (recordedAudios[icon.id]) {
        const audio = new Audio(recordedAudios[icon.id]);
        audio.play().catch(() => speakText(icon.name));
      } else {
        speakText(icon.name);
      }
    }

    function speakText(text) {
      return new Promise((resolve) => {
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ko-KR';
          utterance.rate = 0.9;
          utterance.onend = resolve;
          utterance.onerror = resolve;
          speechSynthesis.speak(utterance);
        } else {
          resolve();
        }
      });
    }

    function openRecordModal(icon) {
      currentRecordingIconId = icon.id;
      const modal = document.getElementById('record-modal');
      document.getElementById('modal-icon').textContent = icon.emoji;
      document.getElementById('modal-title').textContent = `"${icon.name}" 녹음하기`;

      document.getElementById('status-ready').classList.remove('hidden');
      document.getElementById('status-recording').classList.add('hidden');
      document.getElementById('status-recorded').classList.add('hidden');

      const playBtn = document.getElementById('play-recorded-btn');
      if (recordedAudios[icon.id]) {
        playBtn.classList.remove('hidden');
        document.getElementById('status-ready').classList.add('hidden');
        document.getElementById('status-recorded').classList.remove('hidden');
      } else {
        playBtn.classList.add('hidden');
      }
      modal.classList.remove('hidden');
    }

    function closeRecordModal() {
      document.getElementById('record-modal').classList.add('hidden');
      currentRecordingIconId = null;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }

    function openTeacherModal() {
      document.getElementById('teacher-modal').classList.remove('hidden');
    }

    function closeTeacherModal() {
      document.getElementById('teacher-modal').classList.add('hidden');
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      currentTeacherRecordingPart = null;
    }

    async function toggleRecording() {
      const recordBtn = document.getElementById('record-btn');

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.textContent = '🎤 녹음';
        recordBtn.classList.remove('recording');
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

          mediaRecorder.onstop = () => {
            const mimeType = mediaRecorder.mimeType || 'audio/mp4';
            const audioBlob = new Blob(audioChunks, { type: mimeType });
            
            // 데이터베이스에 오디오 원본(Blob) 저장
            saveAudioToDB(currentRecordingIconId, audioBlob);
            
            const audioUrl = URL.createObjectURL(audioBlob);
            recordedAudios[currentRecordingIconId] = audioUrl;

            const iconEl = document.querySelector(`[data-icon-id="${currentRecordingIconId}"]`);
            if (iconEl) iconEl.classList.add('has-recording');

            document.getElementById('status-ready').classList.add('hidden');
            document.getElementById('status-recording').classList.add('hidden');
            document.getElementById('status-recorded').classList.remove('hidden');
            document.getElementById('play-recorded-btn').classList.remove('hidden');

            stream.getTracks().forEach(track => track.stop());
            showToast('녹음이 안전하게 저장되었어요! 🎉 (새로고침해도 유지됩니다)');
          };

          mediaRecorder.start();

          document.getElementById('status-ready').classList.add('hidden');
          document.getElementById('status-recording').classList.remove('hidden');
          document.getElementById('status-recorded').classList.add('hidden');

          recordBtn.textContent = '⏹️ 중지';
          recordBtn.classList.add('recording');

        } catch (err) {
          showToast('마이크 접근 권한이 필요해요 🎤');
          console.error(err);
        }
      }
    }

    async function toggleTeacherRecording(part) {
      const recordBtn = part === 'prefix' ? document.getElementById('record-prefix-btn') : document.getElementById('record-suffix-btn');

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.textContent = '🎤 녹음';
        recordBtn.classList.remove('recording');
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          currentTeacherRecordingPart = part;

          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

          mediaRecorder.onstop = () => {
            const mimeType = mediaRecorder.mimeType || 'audio/mp4';
            const audioBlob = new Blob(audioChunks, { type: mimeType });
            const audioUrl = URL.createObjectURL(audioBlob);

            if (part === 'prefix') {
              saveAudioToDB('teacher_prefix', audioBlob); // DB에 저장
              teacherPrefixAudio = audioUrl;
              document.getElementById('prefix-status').textContent = '✅ 녹음 완료 (저장됨)';
              document.getElementById('play-prefix-btn').classList.remove('hidden');
            } else {
              saveAudioToDB('teacher_suffix', audioBlob); // DB에 저장
              teacherSuffixAudio = audioUrl;
              document.getElementById('suffix-status').textContent = '✅ 녹음 완료 (저장됨)';
              document.getElementById('play-suffix-btn').classList.remove('hidden');
            }

            stream.getTracks().forEach(track => track.stop());
            showToast('교사 음성이 안전하게 저장되었어요! 🎉 (새로고침해도 유지됩니다)');
          };

          mediaRecorder.start();
          recordBtn.textContent = '⏹️ 중지';
          recordBtn.classList.add('recording');

        } catch (err) {
          showToast('마이크 접근 권한이 필요해요 🎤');
        }
      }
    }

    function playRecordedAudio() {
      if (currentRecordingIconId && recordedAudios[currentRecordingIconId]) {
        const audio = new Audio(recordedAudios[currentRecordingIconId]);
        audio.play();
      }
    }

    function playTeacherAudio(part) {
      if (part === 'prefix' && teacherPrefixAudio) {
        new Audio(teacherPrefixAudio).play();
      } else if (part === 'suffix' && teacherSuffixAudio) {
        new Audio(teacherSuffixAudio).play();
      }
    }

    let draggedIconId = null;

    function setupDropZone() {
      const dropZone = document.getElementById('drop-zone');

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const iconId = e.dataTransfer.getData('text/plain');
        handleDrop(iconId);
      });

      document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        
        if (!draggedIconId && e.target.closest('.icon-item')) {
           draggedIconId = e.target.closest('.icon-item').getAttribute('data-icon-id');
        }

        if (target && (target.id === 'drop-zone' || target.closest('#drop-zone'))) {
          dropZone.classList.add('drag-over');
        } else {
          dropZone.classList.remove('drag-over');
        }
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        if (!draggedIconId) return;
        const touch = e.changedTouches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);

        if (target && (target.id === 'drop-zone' || target.closest('#drop-zone'))) {
          handleDrop(draggedIconId);
        }

        dropZone.classList.remove('drag-over');
        draggedIconId = null;
      });
    }

    function handleDrop(iconId) {
      const icon = iconData.find(i => i.id === iconId);
      if (!icon) return;

      droppedIconId = iconId;

      document.getElementById('drop-placeholder').classList.add('hidden');
      document.getElementById('dropped-item').classList.remove('hidden');
      document.getElementById('dropped-icon').textContent = icon.emoji;
      document.getElementById('dropped-name').textContent = icon.name;
      
      document.getElementById('drop-zone').classList.add('has-item');
      document.getElementById('speak-btn').disabled = false;
      document.getElementById('reset-btn').style.display = 'block';
      document.getElementById('reset-hidden-msg').style.display = 'none';
    }

    function resetSelection() {
      droppedIconId = null;
      
      const dropZone = document.getElementById('drop-zone');
      dropZone.classList.remove('has-item', 'drag-over');
      document.getElementById('drop-placeholder').classList.remove('hidden');
      document.getElementById('dropped-item').classList.add('hidden');
      
      document.getElementById('speak-btn').disabled = true;
      document.getElementById('reset-btn').style.display = 'none';
      document.getElementById('reset-hidden-msg').style.display = 'block';

      showToast('선택이 취소되었습니다. 다른 아이콘을 올려보세요! 🎨');
    }

    async function speakFullSentence() {
      if (!droppedIconId) return;
      const icon = iconData.find(i => i.id === droppedIconId);
      if (!icon) return;

      const prefix = defaultConfig.sentence_prefix;
      const suffix = defaultConfig.sentence_suffix;

      // 1. 앞부분 재생
      if (teacherPrefixAudio) {
        await new Promise((resolve) => {
          const audio = new Audio(teacherPrefixAudio);
          audio.onended = resolve;
          audio.onerror = () => speakText(prefix).then(resolve);
          audio.play().catch(() => speakText(prefix).then(resolve));
        });
      } else {
        await speakText(prefix);
      }

      // 2. 단어 재생
      if (recordedAudios[droppedIconId]) {
        await new Promise((resolve) => {
          const audio = new Audio(recordedAudios[droppedIconId]);
          audio.onended = resolve;
          audio.onerror = () => speakText(icon.name).then(resolve);
          audio.play().catch(() => speakText(icon.name).then(resolve));
        });
      } else {
        await speakText(icon.name);
      }

      // 3. 뒷부분 재생
      if (teacherSuffixAudio) {
        await new Promise((resolve) => {
          const audio = new Audio(teacherSuffixAudio);
          audio.onended = resolve;
          audio.onerror = () => speakText(suffix).then(resolve);
          audio.play().catch(() => speakText(suffix).then(resolve));
        });
      } else {
        await speakText(suffix);
      }
    }

    function init() {
      createIconsGrid();
      setupDropZone();
      
      // IndexedDB 초기화 및 기존 녹음 불러오기
      initDB().then(() => {
        loadAudiosFromDB();
      }).catch(err => {
        console.error("오류:", err);
      });

      // 이벤트 리스너 등록
      document.getElementById('record-btn').addEventListener('click', toggleRecording);
      document.getElementById('play-recorded-btn').addEventListener('click', playRecordedAudio);
      document.getElementById('close-modal-btn').addEventListener('click', closeRecordModal);
      document.getElementById('speak-btn').addEventListener('click', speakFullSentence);
      document.getElementById('reset-btn').addEventListener('click', resetSelection);
      document.getElementById('clear-db-btn').addEventListener('click', clearAllAudiosDB);

      document.getElementById('teacher-panel-btn').addEventListener('click', openTeacherModal);
      document.getElementById('close-teacher-modal-btn').addEventListener('click', closeTeacherModal);
      document.getElementById('record-prefix-btn').addEventListener('click', () => toggleTeacherRecording('prefix'));
      document.getElementById('play-prefix-btn').addEventListener('click', () => playTeacherAudio('prefix'));
      document.getElementById('record-suffix-btn').addEventListener('click', () => toggleTeacherRecording('suffix'));
      document.getElementById('play-suffix-btn').addEventListener('click', () => playTeacherAudio('suffix'));

      // 모달 외부 클릭 시 닫기
      document.getElementById('record-modal').addEventListener('click', (e) => {
        if (e.target.id === 'record-modal') closeRecordModal();
      });
      document.getElementById('teacher-modal').addEventListener('click', (e) => {
        if (e.target.id === 'teacher-modal') closeTeacherModal();
      });
    }

    // 앱 시작
    init();
  </script>
 </body>
</html>
